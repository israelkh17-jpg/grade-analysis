<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025학년도 1학기 중간고사 성적 분석 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#f0f4f8; color:#1a202c; }
.header { background:linear-gradient(135deg,#1e3a5f,#2d6a9f); color:#fff; padding:24px 32px; }
.header h1 { font-size:22px; font-weight:700; }
.header p { font-size:13px; opacity:0.8; margin-top:4px; }
.container { max-width:1280px; margin:0 auto; padding:20px; }

/* KPI Cards */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.kpi-card { background:#fff; border-radius:12px; padding:18px; box-shadow:0 1px 4px rgba(0,0,0,0.06); text-align:center; }
.kpi-card .label { font-size:12px; color:#718096; font-weight:500; margin-bottom:6px; }
.kpi-card .value { font-size:28px; font-weight:700; color:#1e3a5f; }
.kpi-card .sub { font-size:11px; color:#a0aec0; margin-top:2px; }

/* Tabs */
.tabs { display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap; }
.tab-btn { padding:8px 18px; border:none; border-radius:8px; background:#e2e8f0; color:#4a5568; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.tab-btn.active { background:#1e3a5f; color:#fff; }
.tab-btn:hover { background:#cbd5e0; }
.tab-btn.active:hover { background:#2d5a8a; }

/* Panels */
.panel { display:none; }
.panel.active { display:block; }

/* Cards */
.card { background:#fff; border-radius:12px; padding:20px; box-shadow:0 1px 4px rgba(0,0,0,0.06); margin-bottom:20px; }
.card h3 { font-size:15px; font-weight:700; color:#1e3a5f; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid #e2e8f0; }

/* Grid */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
@media(max-width:768px) { .grid-2 { grid-template-columns:1fr; } }

/* Table */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
th { background:#f7fafc; padding:8px 10px; text-align:center; font-weight:600; color:#4a5568; border-bottom:2px solid #e2e8f0; position:sticky; top:0; }
td { padding:7px 10px; text-align:center; border-bottom:1px solid #edf2f7; }
tr:hover { background:#f7fafc; }

/* Item analysis bar */
.item-bar { display:flex; align-items:center; margin:3px 0; }
.item-bar .q-label { width:42px; font-size:11px; font-weight:600; color:#4a5568; text-align:right; padding-right:8px; flex-shrink:0; }
.item-bar .bar-bg { flex:1; height:22px; background:#edf2f7; border-radius:4px; position:relative; overflow:hidden; }
.item-bar .bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; font-size:10px; font-weight:600; color:#fff; transition:width 0.6s ease; }
.item-bar .point-label { width:40px; font-size:10px; color:#a0aec0; text-align:left; padding-left:6px; flex-shrink:0; }

/* Rate colors */
.rate-high { background:linear-gradient(90deg,#38a169,#48bb78); }
.rate-mid { background:linear-gradient(90deg,#d69e2e,#ecc94b); }
.rate-low { background:linear-gradient(90deg,#e53e3e,#fc8181); }

/* Filters */
.filter-row { display:flex; gap:8px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
.filter-row label { font-size:12px; font-weight:600; color:#4a5568; }
.filter-row select { padding:5px 10px; border:1px solid #cbd5e0; border-radius:6px; font-size:12px; }
.filter-row input { padding:5px 10px; border:1px solid #cbd5e0; border-radius:6px; font-size:12px; width:160px; }

/* Chart container */
.chart-container { position:relative; width:100%; }
.chart-container canvas { width:100% !important; }

/* Wrong dist tooltip style */
.wrong-detail { font-size:11px; color:#718096; margin-top:4px; }
.wrong-chip { display:inline-block; background:#fed7d7; color:#c53030; padding:1px 6px; border-radius:4px; margin:1px; font-size:10px; font-weight:600; }
.correct-chip { display:inline-block; background:#c6f6d5; color:#276749; padding:1px 6px; border-radius:4px; margin:1px; font-size:10px; font-weight:600; }

/* Scroll table */
.scroll-table { max-height:500px; overflow-y:auto; }

/* Box plot area */
.boxplot-row { display:flex; align-items:center; margin:6px 0; }
.boxplot-label { width:40px; font-size:12px; font-weight:600; text-align:right; padding-right:10px; color:#4a5568; }
.boxplot-area { flex:1; height:28px; position:relative; }
.boxplot-line { position:absolute; height:2px; background:#a0aec0; top:13px; }
.boxplot-box { position:absolute; height:20px; top:4px; border-radius:4px; border:2px solid #2d6a9f; background:rgba(45,106,159,0.15); }
.boxplot-median { position:absolute; width:3px; height:20px; top:4px; background:#e53e3e; border-radius:1px; }
.boxplot-whisker { position:absolute; width:1px; height:12px; top:8px; background:#a0aec0; }
.boxplot-cap { position:absolute; width:8px; height:2px; background:#a0aec0; top:13px; }

.rank-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
.rank-1 { background:#fefcbf; color:#975a16; }
.rank-2 { background:#e2e8f0; color:#4a5568; }
.rank-3 { background:#feebc8; color:#9c4221; }
</style>
</head>

<div class="header">
  <h1>2025학년도 1학기 중간고사 성적 분석</h1>
  <p>과학: 통합과학1(4) | 1학년 전체 (1반~9반) | 총 242명</p>
</div>
<div class="container">
  <!-- KPI Cards -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('overview')">전체 개요</button>
    <button class="tab-btn" onclick="showTab('classCompare')">반별 비교</button>
    <button class="tab-btn" onclick="showTab('itemAnalysis')">문항 분석</button>
    <button class="tab-btn" onclick="showTab('scoreDist')">점수 분포</button>
    <button class="tab-btn" onclick="showTab('studentList')">학생 성적표</button>
  </div>

  <!-- Panel: Overview -->
  <div class="panel active" id="panel-overview">
    <div class="grid-2">
      <div class="card">
        <h3>점수 구간별 인원 분포</h3>
        <div class="chart-container"><canvas id="chartOverviewDist" height="260"></canvas></div>
      </div>
      <div class="card">
        <h3>선택형 vs 서답형 평균 비교</h3>
        <div class="chart-container"><canvas id="chartScoreType" height="260"></canvas></div>
      </div>
    </div>
    <div class="card">
      <h3>반별 평균 점수</h3>
      <div class="chart-container"><canvas id="chartClassMean" height="220"></canvas></div>
    </div>
  </div>

  <!-- Panel: Class Compare -->
  <div class="panel" id="panel-classCompare">
    <div class="card">
      <h3>반별 통계 요약</h3>
      <div class="table-wrap">
        <table id="classTable">
          <thead><tr><th>반</th><th>인원</th><th>평균</th><th>중앙값</th><th>표준편차</th><th>최고점</th><th>최저점</th><th>Q1</th><th>Q3</th><th>선택형 평균</th><th>서답형 평균</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <h3>반별 점수 분포 (Box Plot 스타일)</h3>
      <div id="boxplotArea"></div>
    </div>
    <div class="card">
      <h3>반별 점수 구간 분포</h3>
      <div class="chart-container"><canvas id="chartClassDist" height="280"></canvas></div>
    </div>
  </div>

  <!-- Panel: Item Analysis -->
  <div class="panel" id="panel-itemAnalysis">
    <div class="card">
      <h3>문항별 정답률</h3>
      <div id="itemBars"></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>문항별 정답률 차트</h3>
        <div class="chart-container"><canvas id="chartItemRate" height="300"></canvas></div>
      </div>
      <div class="card">
        <h3>문항 상세 분석</h3>
        <div class="filter-row">
          <label>문항 선택:</label>
          <select id="itemSelect" onchange="showItemDetail()"></select>
        </div>
        <div id="itemDetailArea"></div>
        <div class="chart-container" style="margin-top:12px"><canvas id="chartItemWrong" height="200"></canvas></div>
      </div>
    </div>
    <div class="card">
      <h3>반별 문항 정답률 히트맵</h3>
      <div class="table-wrap scroll-table" id="heatmapArea"></div>
    </div>
  </div>

  <!-- Panel: Score Distribution -->
  <div class="panel" id="panel-scoreDist">
    <div class="filter-row">
      <label>반 선택:</label>
      <select id="distClassFilter" onchange="updateDistChart()">
        <option value="all">전체</option>
      </select>
    </div>
    <div class="grid-2">
      <div class="card">
        <h3>점수 분포 히스토그램</h3>
        <div class="chart-container"><canvas id="chartDistHist" height="280"></canvas></div>
      </div>
      <div class="card">
        <h3>누적 분포</h3>
        <div class="chart-container"><canvas id="chartDistCum" height="280"></canvas></div>
      </div>
    </div>
    <div class="card">
      <h3>성적 구간별 비율</h3>
      <div class="chart-container"><canvas id="chartDistPie" height="260"></canvas></div>
    </div>
  </div>

  <!-- Panel: Student List -->
  <div class="panel" id="panel-studentList">
    <div class="filter-row">
      <label>반:</label>
      <select id="studentClassFilter" onchange="filterStudents()">
        <option value="all">전체</option>
      </select>
      <label style="margin-left:12px">검색:</label>
      <input type="text" id="studentSearch" placeholder="이름 검색..." oninput="filterStudents()">
    </div>
    <div class="card">
      <div class="table-wrap scroll-table">
        <table>
          <thead><tr><th>석차</th><th>반</th><th>이름</th><th>선택형</th><th>서답형</th><th>총점</th></tr></thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

    {label:'표준편차', value:o.std, sub:''},
    {label:'최고점', value:o.max+'점', sub:''},
    {label:'최저점', value:o.min+'점', sub:''},
  ];
  document.getElementById('kpiRow').innerHTML = kpis.map(k =>
    `<div class="kpi-card"><div class="label">${k.label}</div><div class="value">${k.value}</div><div class="sub">${k.sub}</div></div>`
  ).join('');
}

// --- Tabs ---
function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  event.target.classList.add('active');
}

    options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, title:{display:true,text:'인원(명)'}}, x:{title:{display:true,text:'점수 구간'}}}}
  });

  const st = DATA.score_types;
  chartScoreType = new Chart(document.getElementById('chartScoreType'), {

      datasets:[{label:'전체 평균', data:[st.select_mean, st.essay_mean], backgroundColor:['rgba(45,106,159,0.7)','rgba(56,161,105,0.7)'], borderRadius:6}]},

  // Add overall mean line via plugin

// --- Class Compare ---
function renderClassCompare() {
  const cs = DATA.class_stats;
  const tbody = document.querySelector('#classTable tbody');
  tbody.innerHTML = cs.map(c => `<tr>
    <td><b>${c.class}반</b></td><td>${c.n}</td><td><b>${c.mean}</b></td><td>${c.median}</td>
    <td>${c.std}</td><td>${c.max}</td><td>${c.min}</td><td>${c.q1}</td><td>${c.q3}</td>
    <td>${c.select_mean}</td><td>${c.essay_mean}</td>
  </tr>`).join('');

  // Box plot
  const area = document.getElementById('boxplotArea');
  area.innerHTML = cs.map(c => {
    const toX = v => ((v / 100) * 100) + '%';
    return `<div class="boxplot-row">
      <div class="boxplot-label">${c.class}반</div>
      <div class="boxplot-area">
        <div class="boxplot-line" style="left:${c.min}%;width:${c.max-c.min}%"></div>
        <div class="boxplot-box" style="left:${c.q1}%;width:${c.q3-c.q1}%"></div>
        <div class="boxplot-median" style="left:${c.median}%"></div>
        <div class="boxplot-cap" style="left:${c.min-0.4}%"></div>
        <div class="boxplot-cap" style="left:${c.max-0.4}%"></div>
      </div>
    </div>`;
  }).join('') + '<div style="display:flex;justify-content:space-between;font-size:10px;color:#a0aec0;padding-left:50px"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div>';

  // Stacked bar
  const dist = DATA.score_dist;
  const datasets = [];
  const barColors = ['#fed7d7','#feebc8','#fefcbf','#c6f6d5','#b2f5ea','#bee3f8','#c4b5fd','#fbb6ce','#e2e8f0','#9ae6b4'];
  dist.labels.forEach((label, i) => {
    datasets.push({
      label: label,
      data: cs.map(c => dist['class_'+c.class][i]),
      backgroundColor: barColors[i]
    });
  });
  new Chart(document.getElementById('chartClassDist'), {
    type:'bar', data:{labels:cs.map(c=>c.class+'반'), datasets},
    options:{responsive:true, plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},
      scales:{x:{stacked:true},y:{stacked:true, title:{display:true,text:'인원(명)'}}}}
  });
}

// --- Item Analysis ---
function renderItemAnalysis() {
  const items = DATA.item_analysis;
  // Bars
  const bars = document.getElementById('itemBars');
  bars.innerHTML = items.map(item => {
    const rate = item.correct_rate;
    const colorClass = rate >= 70 ? 'rate-high' : rate >= 50 ? 'rate-mid' : 'rate-low';
    const pointLabel = item.point > 0 ? item.point+'점' : '무배점';
    return `<div class="item-bar">
      <div class="q-label">${item.q}번</div>
      <div class="bar-bg"><div class="bar-fill ${colorClass}" style="width:${rate}%">${rate}%</div></div>
      <div class="point-label">${pointLabel}</div>
    </div>`;
  }).join('');

  // Chart
  new Chart(document.getElementById('chartItemRate'), {
    type:'bar', data:{labels:items.map(i=>i.q+'번'),
      datasets:[{label:'정답률(%)', data:items.map(i=>i.correct_rate),
        backgroundColor:items.map(i => i.correct_rate >= 70 ? 'rgba(56,161,105,0.7)' : i.correct_rate >= 50 ? 'rgba(214,158,46,0.7)' : 'rgba(229,62,62,0.7)'),
        borderRadius:4}]},
    options:{responsive:true, plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true, max:100, title:{display:true,text:'정답률(%)'}},
        x:{title:{display:true,text:'문항번호'}}}}
  });

  // Item select dropdown
  const sel = document.getElementById('itemSelect');
  sel.innerHTML = items.map(i => `<option value="${i.q}">${i.q}번 (정답:${i.answer}, 배점:${i.point}, 정답률:${i.correct_rate}%)</option>`).join('');
  showItemDetail();

  // Heatmap
  renderHeatmap();
}

let chartItemWrong;
function showItemDetail() {
  const qNum = parseInt(document.getElementById('itemSelect').value);
  const item = DATA.item_analysis.find(i => i.q === qNum);
  const area = document.getElementById('itemDetailArea');

  let wrongHtml = '<div class="wrong-detail">';
  wrongHtml += `<p><b>정답:</b> <span class="correct-chip">${item.answer}번</span> | <b>배점:</b> ${item.point}점 | <b>정답률:</b> ${item.correct_rate}%</p>`;
  wrongHtml += '<p style="margin-top:6px"><b>오답 선택지 분포:</b> ';
  const wrongEntries = Object.entries(item.wrong_dist).sort((a,b) => b[1]-a[1]);
  if(wrongEntries.length === 0) wrongHtml += '(오답 없음)';
  else wrongHtml += wrongEntries.map(([k,v]) => `<span class="wrong-chip">${k}번: ${v}명</span>`).join(' ');
  wrongHtml += '</p>';

  wrongHtml += '<p style="margin-top:6px"><b>반별 정답률:</b> ';
  for(let c = 1; c <= 9; c++) {
    const r = item.class_rates[c] || 0;
    const color = r >= 70 ? '#276749' : r >= 50 ? '#975a16' : '#c53030';
    wrongHtml += `<span style="color:${color};font-weight:600;margin-right:8px">${c}반:${r}%</span>`;
  }
  wrongHtml += '</p></div>';
  area.innerHTML = wrongHtml;

  // Wrong dist chart
  if(chartItemWrong) chartItemWrong.destroy();
  const labels = ['1','2','3','4','5'];
  const correctNum = Math.round(item.correct_rate * DATA.overview.total_students / 100);
  const chartData = labels.map(l => {
    if(parseInt(l) === item.answer) return correctNum;
    return item.wrong_dist[l] || 0;
  });
  const bgColors = labels.map(l => parseInt(l) === item.answer ? 'rgba(56,161,105,0.7)' : 'rgba(229,62,62,0.5)');

  chartItemWrong = new Chart(document.getElementById('chartItemWrong'), {
    type:'bar', data:{labels:labels.map(l=>l+'번'), datasets:[{label:'선택 인원', data:chartData, backgroundColor:bgColors, borderRadius:4}]},
    options:{responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, title:{display:true,text:'인원'}}, x:{title:{display:true,text:'선택지'}}}}
  });
}

function renderHeatmap() {
  const items = DATA.item_analysis;
  let html = '<table><thead><tr><th>반</th>';
  items.forEach(i => html += `<th>${i.q}</th>`);
  html += '</tr></thead><tbody>';
  for(let c = 1; c <= 9; c++) {
    html += `<tr><td><b>${c}반</b></td>`;
    items.forEach(i => {
      const r = i.class_rates[c] || 0;
      const bg = r >= 80 ? '#c6f6d5' : r >= 60 ? '#fefcbf' : r >= 40 ? '#feebc8' : '#fed7d7';
      html += `<td style="background:${bg};font-weight:600;font-size:11px">${r}</td>`;
    });
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('heatmapArea').innerHTML = html;
}

// --- Score Distribution ---
let chartDistHist, chartDistCum, chartDistPie;
function renderScoreDist() {
  const sel = document.getElementById('distClassFilter');
  for(let c = 1; c <= 9; c++) sel.innerHTML += `<option value="${c}">${c}반</option>`;
  updateDistChart();
}

function updateDistChart() {
  const cls = document.getElementById('distClassFilter').value;
  const dist = DATA.score_dist;
  const d = cls === 'all' ? dist.all : dist['class_'+cls];

  if(chartDistHist) chartDistHist.destroy();
  chartDistHist = new Chart(document.getElementById('chartDistHist'), {
    type:'bar', data:{labels:dist.labels, datasets:[{label:'인원', data:d,
      backgroundColor:'rgba(45,106,159,0.7)', borderRadius:6}]},
    options:{responsive:true, plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true, title:{display:true,text:'인원(명)'}}, x:{title:{display:true,text:'점수 구간'}}}}
  });

  // Cumulative
  const cumData = [];
  let cum = 0;
  const total = d.reduce((a,b)=>a+b,0);
  for(let i = d.length-1; i >= 0; i--) {
    cum += d[i];
    cumData.unshift(Math.round(cum/total*100*10)/10);
  }
  if(chartDistCum) chartDistCum.destroy();
  chartDistCum = new Chart(document.getElementById('chartDistCum'), {
    type:'line', data:{labels:dist.labels, datasets:[{label:'누적 비율(%)', data:cumData,
      borderColor:'#2d6a9f', backgroundColor:'rgba(45,106,159,0.1)', fill:true, tension:0.3, pointRadius:4}]},
    options:{responsive:true, plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true, max:100, title:{display:true,text:'누적 비율(%)'}}, x:{title:{display:true,text:'점수 구간 이상'}}}}
  });

  // Pie
  if(chartDistPie) chartDistPie.destroy();
  const pieLabels = ['90점 이상','70~89점','50~69점','50점 미만'];
  const pieData = [
    d[9],
    d[7]+d[8],
    d[5]+d[6],
    d[0]+d[1]+d[2]+d[3]+d[4]
  ];
  chartDistPie = new Chart(document.getElementById('chartDistPie'), {
    type:'doughnut', data:{labels:pieLabels, datasets:[{data:pieData,
      backgroundColor:['#38a169','#2d6a9f','#d69e2e','#e53e3e']}]},
    options:{responsive:true, plugins:{legend:{position:'right'}}}
  });
}

// --- Student List ---
function renderStudentList() {
  const sel = document.getElementById('studentClassFilter');
  for(let c = 1; c <= 9; c++) sel.innerHTML += `<option value="${c}">${c}반</option>`;
  filterStudents();
}

function filterStudents() {
  const cls = document.getElementById('studentClassFilter').value;
  const search = document.getElementById('studentSearch').value.trim().toLowerCase();
  let students = DATA.students;
  if(cls !== 'all') students = students.filter(s => s.class == parseInt(cls));
  if(search) students = students.filter(s => s.name.toLowerCase().includes(search));

  // Re-rank within filter
  const tbody = document.getElementById('studentTableBody');
  tbody.innerHTML = students.map((s, i) => {
    let rankBadge = '';
    if(s.rank <= 3) rankBadge = ` <span class="rank-badge rank-${s.rank}">${s.rank}등</span>`;
    return `<tr>
      <td>${s.rank}${rankBadge}</td>
      <td>${s.class}반</td>
      <td style="text-align:left">${s.name}</td>
      <td>${s.select}</td>
      <td>${s.essay}</td>
      <td><b>${s.total}</b></td>
    </tr>`;
  }).join('');
}

renderKPI();
renderOverview();
renderClassCompare();
renderItemAnalysis();
renderScoreDist();
renderStudentList();
</script>
